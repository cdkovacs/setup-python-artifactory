# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    ignore:
      # @actions/http-client v3+ is ESM-only and v4 also introduced an
      # `exports` field that ncc 0.38 cannot resolve `/lib/auth` against.
      # Stay on v2 until ncc + our CommonJS build catch up.
      - dependency-name: "@actions/http-client"
        update-types: ["version-update:semver-major"]
      # @actions/core v2+ is ESM-only; ncc 0.38 + our CommonJS build
      # can't consume it. Block major bumps until we migrate.
      - dependency-name: "@actions/core"
        update-types: ["version-update:semver-major"]
      # @actions/exec v2+ is ESM-only; same constraint as @actions/core.
      - dependency-name: "@actions/exec"
        update-types: ["version-update:semver-major"]
      # @actions/tool-cache v3+ is ESM-only; ncc 0.38 + our CommonJS build
      # can't consume it. Block major bumps until we migrate.
      - dependency-name: "@actions/tool-cache"
        update-types: ["version-update:semver-major"]
      # @actions/io v2+ is ESM-only; same constraint as @actions/tool-cache.
      - dependency-name: "@actions/io"
        update-types: ["version-update:semver-major"]
